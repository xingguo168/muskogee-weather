name: Daily Weather Push

on:
  # 每天 UTC 12:00 触发 = Muskogee 夏令时早上 7:00
  # 11月起冬令时, 把下面的 "0 12" 改成 "0 13" 即可恢复到 7:00
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  push-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Push weather to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node push.js
